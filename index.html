<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInvest AI - Standalone</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel for Logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0B; color: #F0F0F0; }
        .glass { background: rgba(21, 22, 25, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Mock Database
        const STOCKS_DB = [
            { ticker: 'NVDA', name: 'NVIDIA', price: 875.20, return: 45, risk: 'High' },
            { ticker: 'AAPL', name: 'Apple', price: 172.50, return: 15, risk: 'Low' },
            { ticker: 'MSFT', name: 'Microsoft', price: 415.10, return: 18, risk: 'Low' },
            { ticker: 'TSLA', name: 'Tesla', price: 163.50, return: 35, risk: 'High' },
            { ticker: 'AMZN', name: 'Amazon', price: 178.10, return: 20, risk: 'Medium' }
        ];

        function App() {
            const [results, setResults] = useState(STOCKS_DB);
            const [loading, setLoading] = useState(false);

            const handleAnalyze = () => {
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    alert("ניתוח הושלם! (בגרסת ה-HTML הבודדת, ה-AI דורש מפתח API מוגדר)");
                }, 1000);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-4xl mx-auto mb-8 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="bg-emerald-500 p-2 rounded-lg">
                                <i data-lucide="sparkles" className="text-black"></i>
                            </div>
                            <h1 className="text-2xl font-bold">SmartInvest <span className="text-emerald-500">AI</span></h1>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto grid gap-6">
                        <div className="glass p-6 rounded-2xl">
                            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                <i data-lucide="target" className="text-emerald-500"></i> הגדרות השקעה
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <input type="number" placeholder="מחיר מינימלי" className="bg-black/40 border border-white/10 p-3 rounded-xl" />
                                <input type="number" placeholder="מחיר מקסימלי" className="bg-black/40 border border-white/10 p-3 rounded-xl" />
                                <button onClick={handleAnalyze} className="bg-emerald-500 text-black font-bold py-3 rounded-xl hover:bg-emerald-400 transition-all">
                                    {loading ? "מנתח..." : "הפעל ניתוח"}
                                </button>
                            </div>
                        </div>

                        <div className="glass rounded-2xl overflow-hidden">
                            <table className="w-full text-right">
                                <thead className="bg-white/5 text-xs uppercase opacity-50">
                                    <tr>
                                        <th className="p-4">מניה</th>
                                        <th className="p-4">מחיר</th>
                                        <th className="p-4">תשואה שנתית</th>
                                        <th className="p-4">סיכון</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {results.map(stock => (
                                        <tr key={stock.ticker} className="border-t border-white/5 hover:bg-white/5">
                                            <td className="p-4 font-bold text-emerald-400">{stock.ticker}</td>
                                            <td className="p-4">${stock.price}</td>
                                            <td className="p-4">+{stock.return}%</td>
                                            <td className="p-4">
                                                <span className={`px-2 py-1 rounded-full text-[10px] ${stock.risk === 'High' ? 'bg-red-500/20 text-red-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                                                    {stock.risk}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize icons after React render
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
