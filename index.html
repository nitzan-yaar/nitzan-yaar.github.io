<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInvest AI - ניתוח השקעות בזמן אמת</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090B;
            color: #FAFAFA;
            margin: 0;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(18, 18, 22, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .emerald-glow {
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.1);
        }
        input, select {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            border-color: #10b981 !important;
            outline: none;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }
        .ai-gradient {
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .pulse-ai {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // מאגר נתונים מורחב
        const STOCKS_DB = [
            { ticker: 'NVDA', name: 'NVIDIA', price: 875, volatility: 9, return: 45, sector: 'AI & Chips' },
            { ticker: 'AAPL', name: 'Apple', price: 172, volatility: 4, return: 15, sector: 'Consumer Tech' },
            { ticker: 'TSLA', name: 'Tesla', price: 163, volatility: 10, return: 35, sector: 'EV & Energy' },
            { ticker: 'MSFT', name: 'Microsoft', price: 415, volatility: 3, return: 18, sector: 'Software' },
            { ticker: 'AMZN', name: 'Amazon', price: 178, volatility: 6, return: 20, sector: 'E-commerce' },
            { ticker: 'GOOGL', name: 'Google', price: 151, volatility: 5, return: 22, sector: 'Search & AI' },
            { ticker: 'META', name: 'Meta', price: 495, volatility: 7, return: 28, sector: 'Social Media' },
            { ticker: 'LLY', name: 'Eli Lilly', price: 750, volatility: 5, return: 40, sector: 'Healthcare' },
            { ticker: 'AMD', name: 'AMD', price: 190, volatility: 8, return: 30, sector: 'Semiconductors' },
            { ticker: 'V', name: 'Visa', price: 280, volatility: 3, return: 14, sector: 'Fintech' }
        ];

        function App() {
            const [minPrice, setMinPrice] = useState(10);
            const [maxPrice, setMaxPrice] = useState(1000);
            const [risk, setRisk] = useState('Medium');
            const [horizon, setHorizon] = useState('Medium');
            const [results, setResults] = useState([]);
            const [aiInsight, setAiInsight] = useState('');
            const [loading, setLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showKeyModal, setShowKeyModal] = useState(false);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const runAnalysis = async () => {
                setLoading(true);
                
                // 1. אלגוריתם סינון לוגי
                const filtered = STOCKS_DB.filter(s => s.price >= minPrice && s.price <= maxPrice);
                const scored = filtered.map(s => {
                    const targetRisk = risk === 'Low' ? 3 : risk === 'Medium' ? 6 : 9;
                    const riskMatch = 100 - (Math.abs(s.volatility - targetRisk) * 10);
                    
                    let horizonBonus = 0;
                    if (horizon === 'Long' && s.volatility < 5) horizonBonus = 15;
                    if (horizon === 'Short' && s.return > 30) horizonBonus = 15;
                    
                    const score = Math.round((riskMatch * 0.6) + (s.return * 0.3) + horizonBonus);
                    return { ...s, score: Math.min(100, Math.max(0, score)) };
                }).sort((a, b) => b.score - a.score).slice(0, 5);

                setResults(scored);
                updateChart(scored);

                // 2. קריאת API ל-Gemini
                if (apiKey && scored.length > 0) {
                    try {
                        const horizonText = horizon === 'Short' ? 'עד שנה' : horizon === 'Medium' ? '1-5 שנים' : '5+ שנים';
                        const prompt = `אתה אנליסט פיננסי בכיר. נתח את 5 המניות הבאות עבור משקיע עם רמת סיכון ${risk} ואופק השקעה של ${horizonText}: ${scored.map(s => s.ticker).join(', ')}. 
                        כתוב ניתוח מקצועי, קצר וחד בעברית (עד 100 מילים) שמסביר למה המניה המובילה היא הבחירה הנכונה ביותר כרגע.`;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }]
                            })
                        });
                        
                        const data = await response.json();
                        if (data.candidates && data.candidates[0]) {
                            setAiInsight(data.candidates[0].content.parts[0].text);
                        } else {
                            throw new Error('API Error');
                        }
                    } catch (e) {
                        setAiInsight("שגיאה בחיבור ל-AI. וודא שמפתח ה-API תקין (לחץ על אייקון המפתח למעלה).");
                    }
                } else {
                    setAiInsight("הזן מפתח API בהגדרות כדי להפעיל את ניתוח ה-AI החי.");
                }
                setLoading(false);
            };

            const updateChart = (data) => {
                if (!chartRef.current) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'bubble',
                    data: {
                        datasets: [{
                            data: data.map(s => ({ x: s.volatility, y: s.return, r: s.score / 4 })),
                            backgroundColor: 'rgba(16, 185, 129, 0.4)',
                            borderColor: '#10b981',
                            borderWidth: 2,
                            hoverBackgroundColor: '#10b981'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'רמת סיכון', color: '#666' }, min: 0, max: 11, grid: { color: 'rgba(255,255,255,0.05)' } },
                            y: { title: { display: true, text: 'תשואה שנתית %', color: '#666' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            };

            const saveApiKey = (key) => {
                localStorage.setItem('gemini_api_key', key);
                setApiKey(key);
                setShowKeyModal(false);
            };

            useEffect(() => {
                runAnalysis();
                if (window.lucide) window.lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-12">
                        <div className="flex items-center gap-4">
                            <div className="bg-emerald-500 p-3 rounded-2xl emerald-glow">
                                <i data-lucide="cpu" className="text-black w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tight">SmartInvest <span className="ai-gradient">AI</span></h1>
                                <p className="text-[10px] opacity-30 uppercase tracking-widest font-bold">Advanced Financial Intelligence</p>
                            </div>
                        </div>
                        <button onClick={() => setShowKeyModal(true)} className="glass p-3 rounded-xl hover:bg-white/10 transition-all group">
                            <i data-lucide="key" className={`w-5 h-5 transition-colors ${apiKey ? 'text-emerald-500' : 'text-red-500'}`}></i>
                        </button>
                    </header>

                    {/* API Key Modal */}
                    {showKeyModal && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="glass p-8 rounded-[2.5rem] max-w-md w-full space-y-6">
                                <div className="flex items-center gap-3 text-emerald-500">
                                    <i data-lucide="shield-check"></i>
                                    <h3 className="text-xl font-bold">הגדרת API Key</h3>
                                </div>
                                <p className="text-xs opacity-50 leading-relaxed">כדי להפעיל AI אמיתי ב-GitHub, עליך להזין מפתח Gemini API. המפתח נשמר בדפדפן שלך בלבד.</p>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => setApiKey(e.target.value)}
                                    className="w-full p-4 rounded-xl text-sm" 
                                    placeholder="הדבק מפתח Gemini כאן..." 
                                />
                                <div className="flex gap-3">
                                    <button onClick={() => saveApiKey(apiKey)} className="flex-1 bg-emerald-500 text-black font-bold py-3 rounded-xl hover:bg-emerald-400 transition-all">שמור מפתח</button>
                                    <button onClick={() => setShowKeyModal(false)} className="flex-1 glass py-3 rounded-xl">ביטול</button>
                                </div>
                                <div className="text-center">
                                    <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-[10px] text-emerald-500 underline">לחץ כאן להוצאת מפתח בחינם</a>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Sidebar */}
                        <aside className="lg:col-span-4 space-y-6">
                            <div className="glass p-8 rounded-[2.5rem] space-y-8">
                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest block">טווח מחיר מניה ($)</label>
                                    <div className="flex gap-3">
                                        <input type="number" value={minPrice} onChange={e => setMinPrice(e.target.value)} className="w-full p-3 rounded-xl text-sm" />
                                        <input type="number" value={maxPrice} onChange={e => setMaxPrice(e.target.value)} className="w-full p-3 rounded-xl text-sm" />
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest block">פרופיל סיכון</label>
                                    <select value={risk} onChange={e => setRisk(e.target.value)} className="w-full p-3 rounded-xl text-sm appearance-none cursor-pointer">
                                        <option value="Low">נמוך (סולידי)</option>
                                        <option value="Medium">בינוני (מאוזן)</option>
                                        <option value="High">גבוה (אגרסיבי)</option>
                                    </select>
                                </div>

                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest block">אופק השקעה</label>
                                    <select value={horizon} onChange={e => setHorizon(e.target.value)} className="w-full p-3 rounded-xl text-sm appearance-none cursor-pointer">
                                        <option value="Short">טווח קצר (עד שנה)</option>
                                        <option value="Medium">טווח בינוני (1-5 שנים)</option>
                                        <option value="Long">טווח ארוך (5+ שנים)</option>
                                    </select>
                                </div>

                                <button onClick={runAnalysis} disabled={loading} className="w-full bg-emerald-500 text-black font-black py-4 rounded-2xl hover:bg-emerald-400 transition-all flex items-center justify-center gap-2">
                                    {loading ? <i data-lucide="loader-2" className="animate-spin"></i> : <i data-lucide="sparkles"></i>}
                                    נתח עם AI
                                </button>
                            </div>
                        </aside>

                        {/* Main */}
                        <div className="lg:col-span-8 space-y-6">
                            {/* AI Insight */}
                            <div className={`glass p-6 rounded-3xl border-emerald-500/20 relative overflow-hidden ${loading ? 'pulse-ai' : ''}`}>
                                <div className="flex items-center gap-2 mb-3 text-emerald-500 font-bold text-xs uppercase tracking-widest">
                                    <i data-lucide="bot" className="w-4 h-4"></i> Gemini AI Analysis
                                </div>
                                <p className="text-sm leading-relaxed italic opacity-90">
                                    {loading ? "מבצע ניתוח מעמיק באמצעות Gemini 1.5 Flash..." : `"${aiInsight}"`}
                                </p>
                            </div>

                            {/* Chart */}
                            <div className="glass p-6 rounded-[2.5rem] h-[320px]">
                                <h3 className="text-[10px] uppercase opacity-30 font-bold mb-4 tracking-widest">מפת סיכון מול תשואה</h3>
                                <canvas ref={chartRef}></canvas>
                            </div>

                            {/* Results */}
                            <div className="space-y-3">
                                {results.map(stock => (
                                    <div key={stock.ticker} className="glass p-6 rounded-2xl flex justify-between items-center hover:bg-white/5 transition-all group">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-500 font-black text-xl group-hover:scale-110 transition-transform">
                                                {stock.ticker[0]}
                                            </div>
                                            <div>
                                                <div className="font-black text-xl">{stock.ticker}</div>
                                                <div className="text-[10px] opacity-30 uppercase font-bold">{stock.sector}</div>
                                            </div>
                                        </div>
                                        <div className="text-right hidden md:block">
                                            <div className="font-bold text-lg">${stock.price}</div>
                                            <div className="text-[10px] text-emerald-500 font-bold">+{stock.return}% תשואה שנתית</div>
                                        </div>
                                        <div className="flex flex-col items-center bg-white/5 px-5 py-2 rounded-xl border border-white/5">
                                            <div className="text-[8px] opacity-30 uppercase font-bold mb-1">Score</div>
                                            <div className="text-2xl font-black text-emerald-500">{stock.score}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize icons
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 500);
    </script>
</body>
</html>
